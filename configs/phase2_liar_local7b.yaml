# Phase 2a — first real run: LIARArg gold ONLY (no silver, no ARIES yet).
# Local Qwen-7B teacher is configured but unused this run (no silver
# sources). Pure gold-fine-tune of Flan-T5-Large on LIARArg's canonical
# train split, evaluated on the canonical test split.
#
# This is the cleanest single-domain Phase 2 milestone: it answers
# "can a learned parser approximate the gold parser on the same domain?"
# before we add cross-domain silver in Phase 2b.
#
# Server-side setup:
#   - upload data/{train,val,test}.jsonl to ~/argument-aware-rag/data/
#   - source ~/argument-aware-rag/.venv/bin/activate
#   - first run will download Flan-T5-Large (~3 GB) once
run_name: phase2_liar_local7b

dataset:
  aaec_path: ""
  abstrct_path: ""
  liararg_path: data       # ← directory containing {train,val,test}.jsonl
  aries_clean_path: ""
  silver_sources: []
  samples_per_silver_source: 0
  val_frac: 0.10
  test_frac: 0.10
  seed: 42
  output_dir: phase2_data_liar

teacher:
  # Configured but not invoked when silver_sources is empty.
  backend: local_hf
  model: Qwen/Qwen2.5-7B-Instruct
  max_input_chars: 4000
  max_output_tokens: 800
  rpm_cap: 1000
  max_requests_per_day: 100000
  seed: 42
  include_cot: true
  retries_per_call: 1
  quantization: 4bit
  device: auto

student:
  backend: hf
  base_model: google/flan-t5-large
  max_input_len: 512
  max_target_len: 512
  batch_size: 4
  grad_accum: 8
  learning_rate: 0.0003
  weight_decay: 0.01
  warmup_ratio: 0.1
  num_epochs: 3               # 3 is usually enough for T5 fine-tune; 5 was overkill
  # CRITICAL: T5 family models (incl. Flan-T5) are known to overflow in fp16
  # because RMSNorm's rsqrt op produces NaN activations. AMP's grad scaler
  # then collapses the LR to 0 — silent training failure with hardware-busy
  # symptoms. On Pascal (no bf16), the only safe dtype is fp32.
  fp16: false
  gradient_checkpointing: true
  optim: adafactor            # rank-1 state, ~4 GB lower than Adam, fits 11 GB VRAM
  seed: 42
  eval_every_steps: 0

student_output_dir: phase2_student_liar
