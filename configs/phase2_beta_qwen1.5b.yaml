# Phase 2-β v1: distill Qwen-0.5B-Instruct on 4 gold extractive corpora.
# (Initially planned Qwen-1.5B; downsized after OOM on 1080 Ti.
# 1.5B fits with LoRA — saved for Phase 2-β v2.)
#
# Training pool (excludes LIARArg — that's the held-out integration target):
#   - AbstRCT      (medical RCT abstracts)
#   - Microtext    (mixed-topic opinion essays)
#   - CDCP         (US e-rulemaking public comments)
#   - PERSPECTRUM  (controversial claims + perspectives + evidence)
#   Total: ~1494 train + 268 val + 688 test records, 4 domains.
#
# Server-side prereqs:
#   - Phase 2 data assembled in ~/argument-aware-rag/phase2_data/unified/
#   - venv has transformers, accelerate, sentencepiece (already installed)
#
# Expected wall-clock on GTX 1080 Ti:
#   - Tokenisation:   ~1 min
#   - Training:       ~30-60 min (~3 epochs over 1494 records)
#   - Eval per split: ~5-10 min (Qwen-1.5B generation is fast)
#
# Comparison target: Phase 2-α's 6-way F1 = 0.254 on LIARArg via Phase 1.
# A distilled Qwen-1.5B that beats that = Phase 2-β architecture validated.
run_name: phase2_beta_qwen1.5b

dataset:
  liararg_path: ""       # not used here — we load unified directory directly
  aaec_path: ""
  abstrct_path: ""
  aries_clean_path: ""
  silver_sources: []
  samples_per_silver_source: 0
  val_frac: 0.10
  test_frac: 0.10
  seed: 42
  output_dir: phase2_data/unified    # ← unified corpus directory

teacher:
  # Not invoked during this training run; reserved for later silver passes.
  backend: dummy
  model: ""

student:
  backend: hf
  # Pascal hardware (GTX 1080 Ti) has no flash-attn — self-attention is
  # quadratic O(seq²) on memory. Even Qwen-0.5B OOM'd at batch 4 × 1536-token
  # sequences (~10.5 GB used). The bottleneck is the attention scores matrix,
  # not the model weights.
  # Fix: shorter sequences (most of our training examples are < 500 tokens
  # anyway) + small batch + gradient checkpointing.
  base_model: Qwen/Qwen2.5-0.5B-Instruct
  # NOTE: max_input_len + max_target_len are read by BOTH train() and predict().
  # Training cap (smaller for VRAM): see comment above.
  # Inference uses these values too — the model generalises beyond its
  # training horizon thanks to Qwen's RoPE, so we leave them larger here
  # for inference quality. Production training values were 512/256.
  max_input_len: 2048              # inference reach (training was 512)
  # IMPORTANT: keep close to training max_target_len. Model never learned
  # to emit <|im_end|> past 256 tokens, so a 768-token inference budget
  # made it produce 500+ tokens of post-JSON garbage per row — capping
  # wall-clock at ~67s/row on Pascal. 384 caps worst-case at ~35s and
  # is still more than the average training target (most JSON outputs
  # fit in 200-300 tokens).
  max_target_len: 384              # inference JSON budget (training was 256)
  batch_size: 2                    # micro-batch — tight on Pascal
  grad_accum: 16                   # effective batch 32
  learning_rate: 0.0002
  weight_decay: 0.01
  warmup_ratio: 0.1
  num_epochs: 3
  fp16: true                       # Qwen is fp16-stable
  gradient_checkpointing: true     # ESSENTIAL on Pascal — recomputes activations
  optim: adafactor                 # rank-1 state — lowest optimizer footprint
  seed: 42
  eval_every_steps: 0

student_output_dir: phase2_student_beta_qwen0.5b
