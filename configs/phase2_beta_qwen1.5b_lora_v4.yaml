# Phase 2-β v4: fresh adapter on 5 gold + LIARArg silver from gpt-oss-120b.
#
# v3 result: avg comp-F1 0.207 in-domain (full uncapped test sets), 83% empty
#            on LIARArg cross-domain transfer.
# v4 hypothesis: adding LIARArg silver from the teacher gives the student
#                direct exposure to Politifact-style journalistic text, fixing
#                the cross-domain failure that scaling alone (v3) couldn't.
#
# Training mix:
#   - AbstRCT  (700 train+val+test)
#   - Microtext (112)
#   - CDCP     (731)
#   - PERSPECTRUM (907)
#   - AAEC     (402)
#   - LIARArg silver (2,123 train only)
#   Total train: ~3,617 records (vs v3's 1,823)
#
# Fresh adapter (NOT continual from v3) — this gives a clean A/B against v3
# on identical methodology. If v4 > v3, the silver helped. If v4 ≈ v3, the
# domain coverage wasn't the missing piece.
#
# Reasoning traces (CoT) are PRESERVED in the silver records on disk but
# IGNORED for v4's training target. v5 will use them.
#
# Server-side prereqs:
#   - phase2_data/silver/liararg_train_silver.jsonl exists (2,123 records)
#   - Symlink it into phase2_data/unified/ so load_unified_corpus picks it up:
#     ln -sf ../silver/liararg_train_silver.jsonl \
#            phase2_data/unified/liararg_silver_train.jsonl
#
# Expected wall: ~13 hours fresh training (vs v3's 5.5h continual).
run_name: phase2_beta_qwen1.5b_lora_v4

dataset:
  liararg_path: ""
  aaec_path: ""
  abstrct_path: ""
  aries_clean_path: ""
  silver_sources: []
  samples_per_silver_source: 0
  val_frac: 0.10
  test_frac: 0.10
  seed: 42
  output_dir: phase2_data/unified    # silver file symlinked into here

teacher:
  backend: dummy
  model: ""

student:
  backend: hf
  base_model: Qwen/Qwen2.5-1.5B-Instruct
  max_input_len: 1024
  max_target_len: 384
  batch_size: 1
  grad_accum: 32
  learning_rate: 0.0002
  weight_decay: 0.01
  warmup_ratio: 0.1
  num_epochs: 3                    # full 3 epochs (vs v3's 1 continual)
  fp16: true
  gradient_checkpointing: true
  optim: adafactor
  seed: 42
  eval_every_steps: 0
  # ── LoRA ──
  use_lora: true
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  lora_target_modules: "q_proj,k_proj,v_proj,o_proj"
  # ── Fresh adapter, NOT continual ──
  resume_from_adapter: ""

student_output_dir: phase2_student_beta_qwen1.5b_lora_v4
